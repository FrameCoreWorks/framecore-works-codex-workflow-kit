name: Documentation issue
description: Report unclear, missing, or outdated documentation.
title: "[Docs]: "
labels: ["documentation"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include secrets, private URLs, private project context, generated confidential outputs, emails, or local machine paths.
  - type: textarea
    id: page
    attributes:
      label: Page Or Section
      description: Which file or section needs work?
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: Problem
      description: What is unclear, missing, or inaccurate?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested Fix
      description: Optional wording or structure suggestion.
