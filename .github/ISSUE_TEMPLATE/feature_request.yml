name: Feature request
description: Suggest a provider-neutral improvement.
title: "[Feature]: "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem
      description: What workflow problem should this solve?
    validations:
      required: true
  - type: textarea
    id: proposal
    attributes:
      label: Proposal
      description: What should change?
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - install
        - onboarding
        - agent templates
        - skills
        - examples
        - validation
        - privacy audit
        - documentation
        - HyperFrames workflow knowledge
        - Hipson Adapter
        - Humanizer
        - other
    validations:
      required: true
  - type: checkboxes
    id: policy
    attributes:
      label: Policy Fit
      options:
        - label: This request is provider-neutral or keeps external execution optional.
          required: true
        - label: This request does not require secrets, private project context, local paths, or bundled provider credentials.
          required: true
