name: Bug report
description: Report a reproducible problem with the kit.
title: "[Bug]: "
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Do not include secrets, private URLs, private project context, generated confidential outputs, emails, or local machine paths.
  - type: textarea
    id: summary
    attributes:
      label: Summary
      description: What went wrong?
    validations:
      required: true
  - type: textarea
    id: steps
    attributes:
      label: Steps To Reproduce
      description: List the smallest set of steps that triggers the issue.
      placeholder: |
        1. Clone the repo.
        2. Run ...
        3. See ...
    validations:
      required: true
  - type: textarea
    id: expected
    attributes:
      label: Expected Behavior
    validations:
      required: true
  - type: textarea
    id: actual
    attributes:
      label: Actual Behavior
    validations:
      required: true
  - type: dropdown
    id: area
    attributes:
      label: Area
      options:
        - install
        - onboarding
        - uninstall
        - validation
        - privacy audit
        - agent templates
        - skills
        - documentation
        - CI
        - other
    validations:
      required: true
  - type: input
    id: node
    attributes:
      label: Node Version
      placeholder: "20.x or 22.x"
  - type: textarea
    id: logs
    attributes:
      label: Relevant Output
      description: Paste only sanitized output.
      render: text
