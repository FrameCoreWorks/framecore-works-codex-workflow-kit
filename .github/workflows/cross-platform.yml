name: cross-platform

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/**"
      - "tests/**"
      - "config/**"
      - ".github/workflows/cross-platform.yml"
      - ".github/workflows/validate.yml"
      - "package.json"
      - "AGENTS.template.md"
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "tests/**"
      - "config/**"
      - ".github/workflows/cross-platform.yml"
      - ".github/workflows/validate.yml"
      - "package.json"
      - "AGENTS.template.md"

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Privacy audit
        run: npm run audit:privacy
      - name: Secret scan
        run: npm run secret:scan
      - name: Syntax check
        run: npm run syntax:check
      - name: Workflow validation
        run: npm run validate
      - name: Agent compliance
        run: npm run agent:check
      - name: Tests
        if: matrix.os != 'windows-latest'
        run: npm test
      - name: Tests (Windows audit-security privacy pass)
        if: matrix.os == 'windows-latest'
        run: node --test --test-name-pattern "privacy audit passes" tests/audit-security.test.mjs
      - name: Tests (Windows audit-security privacy fixtures)
        if: matrix.os == 'windows-latest'
        run: node --test --test-name-pattern "privacy audit catches private paths" tests/audit-security.test.mjs
      - name: Tests (Windows audit-security secret filenames)
        if: matrix.os == 'windows-latest'
        run: node --test --test-name-pattern "privacy audit catches secret filenames" tests/audit-security.test.mjs
      - name: Tests (Windows audit-security privacy symlink)
        if: matrix.os == 'windows-latest'
        run: node --test --test-name-pattern "privacy audit rejects symlinks" tests/audit-security.test.mjs
      - name: Tests (Windows audit-security safety fixtures)
        if: matrix.os == 'windows-latest'
        run: node --test --test-name-pattern "secret scan passes" tests/audit-security.test.mjs
      - name: Tests (Windows audit-security safety symlink)
        if: matrix.os == 'windows-latest'
        run: node --test --test-name-pattern "secret scan rejects symlinks" tests/audit-security.test.mjs
      - name: Tests (Windows audit-security package audit)
        if: matrix.os == 'windows-latest'
        run: node --test --test-name-pattern "package audit passes" tests/audit-security.test.mjs
      - name: Tests (Windows audit-security help output)
        if: matrix.os == 'windows-latest'
        run: node --test --test-name-pattern "cli scripts expose" tests/audit-security.test.mjs
      - name: Tests (Windows audit-security release readiness)
        if: matrix.os == 'windows-latest'
        run: node --test --test-name-pattern "release readiness" tests/audit-security.test.mjs
      - name: Tests (Windows docs-validation)
        if: matrix.os == 'windows-latest'
        run: node --test tests/docs-validation.test.mjs
      - name: Tests (Windows doctor-manifest)
        if: matrix.os == 'windows-latest'
        run: node --test tests/doctor-manifest.test.mjs
      - name: Tests (Windows governance)
        if: matrix.os == 'windows-latest'
        run: node --test tests/governance.test.mjs
      - name: Tests (Windows install-onboarding)
        if: matrix.os == 'windows-latest'
        run: node --test tests/install-onboarding.test.mjs
      - name: Tests (Windows validation-contracts)
        if: matrix.os == 'windows-latest'
        run: node --test tests/validation-contracts.test.mjs
      - name: Tests (Windows validation-core)
        if: matrix.os == 'windows-latest'
        run: node --test tests/validation-core.test.mjs
      - name: Install smoke
        run: npm run smoke:install
      - name: Package audit
        run: npm run package:audit
