name: cross-platform

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20]
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Privacy audit
        run: npm run audit:privacy
      - name: Workflow validation
        run: npm run validate
      - name: Tests
        run: npm test
      - name: Package audit
        run: npm run package:audit
