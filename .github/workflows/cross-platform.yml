name: cross-platform

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "scripts/**"
      - "tests/**"
      - "config/**"
      - ".github/workflows/cross-platform.yml"
      - ".github/workflows/validate.yml"
      - "package.json"
      - "AGENTS.template.md"
  push:
    branches: [main]
    paths:
      - "scripts/**"
      - "tests/**"
      - "config/**"
      - ".github/workflows/cross-platform.yml"
      - ".github/workflows/validate.yml"
      - "package.json"
      - "AGENTS.template.md"

permissions:
  contents: read

jobs:
  smoke:
    runs-on: ${{ matrix.os }}
    timeout-minutes: 10
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        node-version: [20]
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-node@v4
        with:
          node-version: ${{ matrix.node-version }}
      - name: Privacy audit
        run: npm run audit:privacy
      - name: Secret scan
        run: npm run secret:scan
      - name: Syntax check
        run: npm run syntax:check
      - name: Workflow validation
        run: npm run validate
      - name: Agent compliance
        run: npm run agent:check
      - name: Tests
        run: npm test
      - name: Install smoke
        run: npm run smoke:install
      - name: Package audit
        run: npm run package:audit
